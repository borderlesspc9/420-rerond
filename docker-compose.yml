services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rerond
      POSTGRES_PASSWORD: rerond
      POSTGRES_DB: rerond
    ports:
      # 5433 no host evita conflito com Postgres já instalado na 5432
      - "5433:5432"
    volumes:
      - rerond_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rerond -d rerond"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  rerond_pgdata:
